<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd</title>
    <style>
        body {text-align: center; margin-top: 50px;}
        h1 { color: darkslateblue }
    </style>
</head>
<body>
    <script>
        let n = Number(prompt(" Number: "));
        if (n % 2 === 0) {
            let r = n + " is Even";
            console.log(r);
            document.write("<h1>" + r + "</h1>");
        } else {
            let r = n + " is Odd";
            console.log(r);
            document.write("<h1>" + r + "</h1>");
        }
    </script>
</body>
</html>
