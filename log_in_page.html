<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodies - Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .container {
            position: relative;
            width: 400px;
            height: 520px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .form-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-form {
            transform: translateX(0);
        }

        .register-form {
            transform: translateX(100%);
        }

        .container.active .login-form {
            transform: translateX(-100%);
        }

        .container.active .register-form {
            transform: translateX(0);
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #ff4757;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        .input-group input:focus {
            border-color: #ff4757;
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: #ff6b81;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .toggle-text span {
            color: #ff4757;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .toggle-text span:hover {
            color: #e84118;
            text-decoration: underline;
        }

        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        @media (max-width: 480px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="form-container login-form">
            <div class="logo">🍔</div>
            <h2 class="title">Welcome Back</h2>
            <form action="#" onsubmit="event.preventDefault(); alert('Login submitted!');">
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="toggle-text">Don't have an account? <span onclick="toggleForm()">Sign Up</span></p>
        </div>

        <div class="form-container register-form">
            <div class="logo">🍕</div>
            <h2 class="title">Create Account</h2>
            <form action="#" onsubmit="event.preventDefault(); alert('Registration submitted!');">
                <div class="input-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <p class="toggle-text">Already have an account? <span onclick="toggleForm()">Login</span></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            const container = document.getElementById('container');
            container.classList.toggle('active');
        }
    </script>
</body>

</html>
