<!DOCTYPE html>
<html>
<head>
    <title>Enhanced Clock</title>
        <style>
            body {text-align: center; margin-top: 50px; color: darkblue; font-size: 50px;} 
        </style>
</head>
<body>
    <h1 id="clock"></h1>
    <script>
        function clock() {
            let now = new Date();
            
            let dy = String(now.getDate()).padStart(2, '0');
            let mont = String(now.getMonth() + 1).padStart(2, '0');
            let yr = now.getFullYear();

            let hr = String(now.getHours()).padStart(2, '0');
            let mnt = String(now.getMinutes()).padStart(2, '0');
            let second = String(now.getSeconds()).padStart(2, '0');

            let time = `${dy}/${mont}/${yr} ${hr}:${mnt}:${second}`;
            
            document.getElementById("clock").innerHTML = time;
        }

        setInterval(clock, 1000);
        clock(); 
    </script>
</body>
</html>
