<!DOCTYPE html>
<html>
<head>
    <title>Square Function</title>
      <style>
        body {text-align: center; margin-top: 50px; color: black; font-size: 50px;}
    </style>
</head>
<body>
    <script>
        function fu(n) {
            return n * n;
        }

        let r = fu(5);
        let R = fu(12);

        console.log("Square of 5 is: " + r);
        console.log("Square of 12 is: " + R);
        
        document.write("Results: " + r + " and " + R);
    </script>
</body>
</html>
