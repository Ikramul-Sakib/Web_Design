<!DOCTYPE html>
<html>
<head>
    <title>Color Changer</title>
      <style>
        body {text-align: center; margin-top: 50px; color: black; font-size: 50px;}
    </style>
</head>
<body>
    <button id="clrbtn">Change Color</button>
    <p id="msg"></p>

    <script>
        const btn = document.getElementById("clrbtn");
        const msg = document.getElementById("msg");

        btn.addEventListener("click", function() {
            document.body.style.backgroundColor = "lightblue";
            msg.innerHTML = "The color has been changed to light blue!";
        });
    </script>
</body>
</html>
